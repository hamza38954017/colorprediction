<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ panel_name }} - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #0f0f1a; color: #e0e0e0; }
  .sidebar { background: #1a1a2e; min-height: 100vh; padding-top: 20px; }
  .sidebar .nav-link { color: #b0b0c0; border-radius: 8px; margin: 2px 8px; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #6c3fc5; color: #fff; }
  .sidebar .brand { color: #a78bfa; font-size: 1.2rem; font-weight: 700; padding: 10px 20px 20px; }
  .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; }
  .card-header { background: #16213e; border-bottom: 1px solid #2a2a4a; }
  .table { color: #e0e0e0; }
  .table thead th { background: #16213e; color: #a78bfa; border-color: #2a2a4a; }
  .table tbody td { border-color: #2a2a4a; vertical-align: middle; }
  .table tbody tr:hover { background: #16213e; }
  .btn-purple { background: #6c3fc5; color: #fff; border: none; }
  .btn-purple:hover { background: #7c4fd5; color: #fff; }
  .stat-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; padding: 20px; border: 1px solid #2a2a4a; }
  .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: #a78bfa; }
  .badge-pending  { background: #f59e0b; }
  .badge-approved { background: #10b981; }
  .badge-rejected { background: #ef4444; }
  .badge-completed{ background: #3b82f6; }
  .form-control, .form-select { background: #16213e; border: 1px solid #2a2a4a; color: #e0e0e0; }
  .form-control:focus, .form-select:focus { background: #1a1a2e; color: #e0e0e0; border-color: #6c3fc5; box-shadow: 0 0 0 3px rgba(108,63,197,.2); }
</style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar d-none d-md-block">
      <div class="brand"><i class="bi bi-dice-3-fill me-2"></i>{{ panel_name }}</div>
      <nav class="nav flex-column">
        <a class="nav-link {% if request.endpoint=='admin_dashboard' %}active{% endif %}" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a class="nav-link {% if request.endpoint=='admin_deposits' %}active{% endif %}"  href="/admin/deposits"><i class="bi bi-cash-coin me-2"></i>Deposits</a>
        <a class="nav-link {% if request.endpoint=='admin_withdrawals' %}active{% endif %}" href="/admin/withdrawals"><i class="bi bi-bank me-2"></i>Withdrawals</a>
        <a class="nav-link {% if request.endpoint=='admin_users' %}active{% endif %}"     href="/admin/users"><i class="bi bi-people me-2"></i>Users</a>
        <a class="nav-link {% if request.endpoint=='admin_packages' %}active{% endif %}"  href="/admin/packages"><i class="bi bi-box-seam me-2"></i>Packages</a>
        <a class="nav-link {% if request.endpoint=='admin_payment_info' %}active{% endif %}" href="/admin/payment-info"><i class="bi bi-qr-code me-2"></i>Payment Info</a>
        <a class="nav-link {% if request.endpoint=='admin_referrals' %}active{% endif %}" href="/admin/referrals"><i class="bi bi-share me-2"></i>Referrals</a>
        <a class="nav-link {% if request.endpoint=='admin_broadcast' %}active{% endif %}" href="/admin/broadcast"><i class="bi bi-megaphone me-2"></i>Broadcast</a>
        <a class="nav-link {% if request.endpoint=='admin_settings' %}active{% endif %}"  href="/admin/settings"><i class="bi bi-gear me-2"></i>Settings</a>
        <hr class="border-secondary">
        <a class="nav-link text-danger" href="/admin/logout"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
      </nav>
    </div>
    <!-- Content -->
    <div class="col-md-10 py-4 px-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'success' if cat=='success' else 'warning' if cat=='warning' else 'danger' }} alert-dismissible fade show" role="alert">
            {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
