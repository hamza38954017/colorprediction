<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ panel_name }} — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #0f0f1a; color: #e0e0e0; display:flex; align-items:center; min-height:100vh; }
  .login-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 40px; max-width: 400px; margin: auto; }
  .form-control { background: #16213e; border: 1px solid #2a2a4a; color: #e0e0e0; }
  .form-control:focus { background: #1a1a2e; color: #e0e0e0; border-color: #6c3fc5; box-shadow: none; }
  .btn-purple { background: #6c3fc5; color: #fff; border: none; width:100%; padding:12px; border-radius:8px; font-weight:600; }
  .btn-purple:hover { background: #7c4fd5; color: #fff; }
  .brand { color: #a78bfa; font-size:1.5rem; font-weight:700; text-align:center; margin-bottom:24px; }
</style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="brand">🎮 {{ panel_name }}</div>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-purple">Login</button>
    </form>
    <p class="text-center text-secondary mt-3 small">{{ copyright }}</p>
  </div>
</div>
</body>
</html>
