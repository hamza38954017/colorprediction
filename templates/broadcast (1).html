{% extends "base.html" %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-megaphone me-2"></i>Broadcast Message</h4>
<div class="card" style="max-width:600px">
  <div class="card-body">
    {% if result %}
    <div class="alert alert-success">✅ Sent to <strong>{{ result.ok }}</strong> users. Failed: {{ result.fail }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Message (Markdown supported)</label>
        <textarea name="text" class="form-control" rows="6" placeholder="*Bold*, _italic_, `code`..."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Image URL (optional)</label>
        <input type="url" name="image_url" class="form-control" placeholder="https://...">
      </div>
      <button type="submit" class="btn btn-purple" onclick="return confirm('Send to all users?')">📢 Send to All Users</button>
    </form>
  </div>
</div>
{% endblock %}
